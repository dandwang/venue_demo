name: venue_demo
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.2.2
  http: ^1.2.1
  logger: ^2.0.2
  audioplayers: ^5.2.1  # 用于播放闹钟声音
  # flutter_local_notifications: ^17.0.0  # 用于本地通知   

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/icon/
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png" # 指向你图标文件的路径
  # 如果你需要支持 Android 8.0+ 的自适应图标，可以添加以下配置
  # adaptive_icon_background: "#ffffff" # 自适应图标的背景色
  # adaptive_icon_foreground: "assets/icon/app_icon_foreground.png" # 前景图